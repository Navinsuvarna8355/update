<script>
(function(){
  function checkMobileNav() {
    const nav = document.getElementById('mobileNav');
    if (!nav) return;
    if (window.innerWidth <= 768) {
      nav.style.display = 'block';
      document.querySelector('.app').style.paddingBottom = '72px';
      // Show scroll hint
      const hint = document.getElementById('scrollHint');
      if (hint) hint.style.display = 'block';
    } else {
      nav.style.display = 'none';
      document.querySelector('.app').style.paddingBottom = '0';
      const hint = document.getElementById('scrollHint');
      if (hint) hint.style.display = 'none';
    }
  }
  window.addEventListener('resize', checkMobileNav);
  window.addEventListener('DOMContentLoaded', checkMobileNav);
  checkMobileNav();

  // Hide scroll hint after first scroll
  document.addEventListener('scroll', function() {
    const hint = document.getElementById('scrollHint');
    if (hint) hint.style.display = 'none';
  }, { once: true, passive: true });

  // Also handle touch scroll on table
  document.addEventListener('DOMContentLoaded', function() {
    const wrap = document.querySelector('.scroll-x');
    if (wrap) {
      wrap.addEventListener('touchstart', function() {
        const hint = document.getElementById('scrollHint');
        if (hint) hint.style.display = 'none';
      }, { once: true, passive: true });
    }
  });

  window.mobileScrollTo = function(key) {
    const targets = {
      chain:   () => document.querySelector('#tableContainer, .section-panel'),
      ai:      () => document.querySelector('.ai-panel'),
      unusual: () => document.querySelector('.unusual-panel, #unusualBody'),
      wa:      () => document.querySelector('.wa-panel, #waBody')
    };
    // Find all section panels and match by header text
    const panels = document.querySelectorAll('.section-panel');
    const textMap = { chain:'OPTION CHAIN', ai:'AI MARKET', unusual:'UNUSUAL', wa:'WHATSAPP' };
    let found = null;
    panels.forEach(p => {
      if (textMap[key] && p.textContent.toUpperCase().includes(textMap[key])) found = p;
    });
    if (!found && targets[key]) found = targets[key]();
    if (found) found.scrollIntoView({behavior:'smooth', block:'start'});
  };
})();
/* ══════════════════════════════════════════════════════
   MASTER SIGNAL TESTER (Tracks ALL 4 Engines)
══════════════════════════════════════════════════════ */
let strategyLogs = [];

function checkAndLogSignals(spot) {
  if (!chainData.length || !spot) return;
  const instrKey = document.getElementById('symbolSel')?.value || '';
  const label    = INSTRUMENTS[instrKey]?.label || 'INDEX';
  const time     = new Date().toLocaleTimeString('en-IN');
  const step     = INSTRUMENTS[instrKey]?.step || 50;
  const atm      = Math.round(spot / step) * step;
  const pcr      = document.getElementById('statPCR')?.textContent || '—';
  const ctx      = `PCR:${pcr}`;

  // 1. AI / OI ANALYSIS ENGINE
  try {
    const r = analyzeOptionChain();
    if (r && r.dirClass && r.dirClass !== 'neutral') {
      registerSignalLog('AI+OI', r.dirClass === 'bullish' ? 'BULL' : 'BEAR',
        spot, time, label, `${r.direction} (${r.confidence}%) ${ctx}`);
    }
  } catch(e) { console.log('MST AI err:', e); }

  // 2. EMA CROSSOVER
  if (emaAllCandles.length > 2) {
    try {
      const opens  = emaAllCandles.map(c => c[1]);
      const closes = emaAllCandles.map(c => c[4]);
      const emaO   = calcEMA(opens,  6);
      const emaC   = calcEMA(closes, 6);
      const n      = emaAllCandles.length - 1;
      if (emaC[n] != null && emaO[n] != null && emaC[n-1] != null && emaO[n-1] != null) {
        if (emaC[n-1] <= emaO[n-1] && emaC[n] > emaO[n])
          registerSignalLog('EMA Cross', 'BULL', spot, time, label, `Bull Cross @ ${spot} ${ctx}`);
        else if (emaC[n-1] >= emaO[n-1] && emaC[n] < emaO[n])
          registerSignalLog('EMA Cross', 'BEAR', spot, time, label, `Bear Cross @ ${spot} ${ctx}`);
      }
    } catch(e) { console.log('MST EMA err:', e); }
  }

  // 3. OI BUILD AT ATM (Call/Put writing)
  try {
    const atmRow = chainData.find(d => d.strike_price === atm);
    if (atmRow) {
      const ce    = atmRow.call_options?.market_data || {};
      const pe    = atmRow.put_options?.market_data  || {};
      const ceChg = (ce.oi||0) - (ce.prev_oi||0);
      const peChg = (pe.oi||0) - (pe.prev_oi||0);
      if (peChg > 0)
        registerSignalLog('OI Build', 'BULL', spot, time, label, `Put Build +${peChg.toLocaleString()} @ ATM ${atm}`);
      if (ceChg > 0)
        registerSignalLog('OI Build', 'BEAR', spot, time, label, `Call Build +${ceChg.toLocaleString()} @ ATM ${atm}`);
    }
  } catch(e) {}

  // 4. SENTIMENT
  try {
    const trendEl = document.getElementById('sentTrendVal');
    const trend   = trendEl?.textContent || '';
    if (trend && trend !== '—') {
      if (trend.toUpperCase().includes('BULL'))
        registerSignalLog('Sentiment', 'BULL', spot, time, label, `${trend} ${ctx}`);
      else if (trend.toUpperCase().includes('BEAR'))
        registerSignalLog('Sentiment', 'BEAR', spot, time, label, `${trend} ${ctx}`);
    }
  } catch(e) {}

  // 5. OI SPIKE ALERTS
  try {
    chainData.forEach(d => {
      const ce   = d.call_options?.market_data || {};
      const pe   = d.put_options?.market_data  || {};
      const s    = d.strike_price;
      if (Math.abs(s - spot) > step * 8) return; // only near ATM
      const cChg = (ce.oi||0) - (ce.prev_oi||0);
      const pChg = (pe.oi||0) - (pe.prev_oi||0);
      if (cChg > 100000)
        registerSignalLog('OI Spike', 'BEAR', spot, time, label, `CE Spike +${(cChg/1000).toFixed(0)}K @ ${s}`);
      if (pChg > 100000)
        registerSignalLog('OI Spike', 'BULL', spot, time, label, `PE Spike +${(pChg/1000).toFixed(0)}K @ ${s}`);
    });
  } catch(e) {}
}

function registerSignalLog(source, type, entrySpot, time, symbol, notes) {
  // Cooldown per source — OI Build/Spike = 30min, others = 5min
  const cooldownMs = (source === 'OI Build' || source === 'OI Spike') 
    ? 30 * 60 * 1000   // 30 min — OI build changes slowly
    : 5  * 60 * 1000;  // 5 min

  const isDuplicate = strategyLogs.some(log =>
    log.source === source && log.type === type && log.symbol === symbol &&
    (new Date() - new Date(log.timestampObj)) < cooldownMs
  );
  if (isDuplicate) return;

  strategyLogs.push({
    id        : Date.now(),
    timestampObj: new Date().toISOString(),
    time,
    source,
    type,
    symbol,
    entrySpot,
    currentSpot : entrySpot,
    maxFavorable: 0,
    maxAdverse  : 0,
    notes
  });

  toast(`🧪 ${type} — ${source}: ${notes.slice(0,40)}`, false);
  renderSignalLogs();
}

function updateSignalLogs(currentSpot) {
  if (!strategyLogs.length || !currentSpot) return;
  const now = new Date();
  strategyLogs.forEach(log => {
    // Only track for 2 hours after entry
    const ageMs = now - new Date(log.timestampObj);
    if (ageMs > 2 * 60 * 60 * 1000) return;

    log.currentSpot = currentSpot;
    const move = currentSpot - log.entrySpot;
    const favorable = log.type === 'BULL' ? move : -move;
    const adverse   = log.type === 'BULL' ? move : -move;

    if (favorable > log.maxFavorable) log.maxFavorable = favorable;
    if (adverse   < log.maxAdverse)   log.maxAdverse   = adverse;
  });
  renderSignalLogs();
}

function renderSignalLogs() {
  const tbody = document.getElementById('logTableBody');
  if (!tbody) return;

  // Update waiting message
  const waiting = document.getElementById('signalWaiting');

  if (!strategyLogs.length) {
    if (waiting) waiting.style.display = '';
    tbody.innerHTML = '';
    return;
  }
  if (waiting) waiting.style.display = 'none';

  const sorted = [...strategyLogs].sort((a,b) => b.id - a.id).slice(0, 50);
  tbody.innerHTML = sorted.map(log => {
    const isBull    = log.type === 'BULL';
    const typeColor = isBull ? '#00e5a0' : '#ff3d6b';
    const typeLabel = isBull ? '▲ BULL' : '▼ BEAR';
    const currMove  = isBull ? (log.currentSpot - log.entrySpot) : (log.entrySpot - log.currentSpot);
    const currColor = currMove > 0 ? '#00e5a0' : currMove < 0 ? '#ff3d6b' : 'var(--muted)';
    const favColor  = log.maxFavorable > 5  ? '#00e5a0' : 'var(--muted)';
    const advColor  = log.maxAdverse   < -5 ? '#ff3d6b' : 'var(--muted)';
    const pnlStr    = `${currMove >= 0 ? '+' : ''}${currMove.toFixed(1)}`;

    return `<tr style="border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:10px;">
      <td style="padding:5px 8px;color:var(--muted);white-space:nowrap;">${log.time}</td>
      <td style="padding:5px 8px;color:#a78bfa;">${log.source}</td>
      <td style="padding:5px 8px;color:${typeColor};font-weight:bold;">${typeLabel}</td>
      <td style="padding:5px 8px;">${log.entrySpot.toFixed(1)}</td>
      <td style="padding:5px 8px;color:${currColor};font-weight:bold;">${log.currentSpot.toFixed(1)} <span style="font-size:9px;">(${pnlStr})</span></td>
      <td style="padding:5px 8px;color:${favColor};">+${log.maxFavorable.toFixed(1)}</td>
      <td style="padding:5px 8px;color:${advColor};">${log.maxAdverse.toFixed(1)}</td>
      <td style="padding:5px 8px;color:var(--muted);font-size:9px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${log.notes}">${log.notes}</td>
    </tr>`;
  }).join('');
}

function exportSignalLogs() {
  if (!strategyLogs.length) return toast('Log empty hai.', true);
  const logStr = JSON.stringify(strategyLogs, null, 2);
  navigator.clipboard.writeText(logStr).then(() => {
    toast('✓ Logs Copied!', false);
  }).catch(err => { toast('Error copying logs', true); });
}

// 1. DATA TRIGGER: This connects your Upstox data to the logic
function onChainLoaded() {
    if (window.chainData && window.chainData.length > 0) {
        const spot = window.chainData[0].underlying_spot_price;
        // Call the function - Now it will be "Defined"
        updateOptionsBattle(); 
        
        // Add other dashboard updates here
        if (typeof updateSentimentDash === 'function') updateSentimentDash();
    }
}

// 2. THE MASTER FUNCTION: updateOptionsBattle
function updateOptionsBattle() {
    // Safety check to prevent errors if data is missing
    if (!window.chainData || !window.chainData.length) return;

    const spot = window.chainData[0].underlying_spot_price;
    const instrKey = document.getElementById('symbolSel')?.value || 'NIFTY';
    const step = (instrKey === 'NIFTY') ? 50 : 100;
    const atm = Math.round(spot / step) * step;

    const now = new Date();
    // Power Hour: 2:30 PM onwards, sensitivity increases 3x
    const isPowerHour = (now.getHours() > 14 || (now.getHours() === 14 && now.getMinutes() >= 30));
    
    let ceWriters = 0, ceBuyers = 0, peWriters = 0, peBuyers = 0;
    let maxCOI = 0, maxPOI = 0, resStrike = 0, supStrike = 0;
    let atmCE = null, atmPE = null;

    window.chainData.forEach(d => {
        const ce = d.call_options?.market_data || {};
        const pe = d.put_options?.market_data || {};
        const s = d.strike_price;

        // Proximity-based Support/Resistance (±750 points)
        if (Math.abs(s - spot) <= 750) { 
            if ((ce.oi || 0) > maxCOI) { maxCOI = ce.oi; resStrike = s; }
            if ((pe.oi || 0) > maxPOI) { maxPOI = pe.oi; supStrike = s; }
        }

        // ATM Detection for Advisor
        if (s === atm) { atmCE = d.call_options; atmPE = d.put_options; }

        // Battle Force: 85/15 Weighted Distribution to kill 0.0K bug
        const ceChg = Math.abs((ce.oi || 0) - (ce.prev_oi || 0));
        const peChg = Math.abs((pe.oi || 0) - (pe.prev_oi || 0));
        const ceLtpChg = ((ce.ltp - (ce.close_price || ce.ltp)) / (ce.close_price || 1)) * 100;
        const peLtpChg = ((pe.ltp - (pe.close_price || pe.ltp)) / (pe.close_price || 1)) * 100;

        if (Math.abs(s - spot) <= 500) {
            const weight = isPowerHour ? 3.0 : 1.0; 
            if (ceLtpChg < -0.01) { ceWriters += ceChg * 0.85 * weight; ceBuyers += ceChg * 0.15; } 
            else { ceBuyers += ceChg * 0.85 * weight; ceWriters += ceChg * 0.15; }

            if (peLtpChg < -0.01) { peWriters += peChg * 0.85 * weight; peBuyers += peChg * 0.15; } 
            else { peBuyers += peChg * 0.85 * weight; peWriters += peChg * 0.15; }
        }
    });

    // 🏆 3. UI LABELS UPDATE (Fixes Dash "-" Bug)
    const cwEl = document.getElementById('callWinner');
    const pwEl = document.getElementById('putWinner');
    if (cwEl) {
        cwEl.innerHTML = ceWriters > ceBuyers ? '<span style="color:#ff3d6b">WRITERS DOMINANT 🔴</span>' : '<span style="color:#00e5a0">BUYERS DOMINANT 🟢</span>';
    }
    if (pwEl) {
        pwEl.innerHTML = peWriters > peBuyers ? '<span style="color:#00e5a0">WRITERS DOMINANT 🟢</span>' : '<span style="color:#ff3d6b">BUYERS DOMINANT 🔴</span>';
    }

    // 🎯 4. PRO ADVISOR (BUY vs SELL MODE)
    const adviceEl = document.getElementById('greeksAdvice');
    if (atmCE && atmPE && adviceEl) {
        const cLTP = atmCE.market_data?.ltp || 0;
        const pLTP = atmPE.market_data?.ltp || 0;
        const pDelta = Math.abs(atmPE.option_greeks?.delta || 0);

        if (ceWriters > ceBuyers * 2.5 && peBuyers > peWriters) {
            adviceEl.innerHTML = `<span style="color:#ff3d6b; font-weight:bold;">📉 PE BUYING:</span> Buy <b>${atm} PE</b> @ <b>₹${pLTP}</b> (Delta: ${pDelta.toFixed(2)})`;
        } else if (peWriters > peBuyers * 2.5 && ceBuyers > ceWriters) {
            adviceEl.innerHTML = `<span style="color:#00e5a0; font-weight:bold;">🚀 CE BUYING:</span> Buy <b>${atm} CE</b> @ <b>₹${cLTP}</b> (Breakout Move)`;
        } else if (ceWriters > ceBuyers * 1.5 && ceWriters > peWriters) {
            adviceEl.innerHTML = `<span style="color:#ff3d6b; font-weight:bold;">🧱 CALL SELLING:</span> Sell <b>${atm} CE</b> @ <b>₹${cLTP}</b> (Theta Advantage)`;
        } else if (peWriters > peBuyers * 1.5 && peWriters > ceWriters) {
            adviceEl.innerHTML = `<span style="color:#00e5a0; font-weight:bold;">🛡️ PUT SELLING:</span> Sell <b>${atm} PE</b> @ <b>₹${pLTP}</b> (Seller Support)`;
        } else {
            adviceEl.innerHTML = `<span style="color:#ffd000">⏳ RANGE: Consolidation near ${atm}. No clear edge.</span>`;
        }
    }

    // 🔮 5. FINAL VERDICT & NUMBERS
    const vEl = document.getElementById('marketVerdict');
    if (vEl) {
        if (ceWriters > ceBuyers * 1.5 && peBuyers > peWriters) { vEl.textContent = "STRONG BEARISH 📉"; vEl.style.color = "#ff3d6b"; }
        else if (peWriters > peBuyers * 1.5 && ceBuyers > ceWriters) { vEl.textContent = "STRONG BULLISH 🚀"; vEl.style.color = "#00e5a0"; }
        else { vEl.textContent = isPowerHour ? "MOMENTUM PRESSURE ⚡" : "SIDEWAYS ⚖️"; vEl.style.color = "#ffd000"; }
    }

    const fNum = (n) => n >= 100000 ? (n/100000).toFixed(2) + 'L' : (n/1000).toFixed(1) + 'K';
    document.getElementById('ceWriteVal').textContent = fNum(ceWriters);
    document.getElementById('ceBuyVal').textContent = fNum(ceBuyers);
    document.getElementById('peWriteVal').textContent = fNum(peWriters);
    document.getElementById('peBuyVal').textContent = fNum(peBuyers);
    document.getElementById('strongResist').textContent = resStrike || '—';
    document.getElementById('strongSupport').textContent = supStrike || '—';
}
</script>
